x-app-environment: &app-environment
    WWWUSER: '${WWWUSER:-1000}'
    LARAVEL_SAIL: 1
    XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
    XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
    IGNITION_LOCAL_SITES_PATH: '${PWD}'

x-app-volumes: &app-volumes
    - '.:/var/www/html'

services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                NODE_VERSION: '${NODE_VERSION:-22}'
        image: 'event-visuals-sail-8.5/app'
        init: true
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment: *app-environment
        volumes: *app-volumes
        networks:
            - sail
        depends_on:
            mailpit:
                condition: service_started
            meilisearch:
                condition: service_healthy
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '--fail', '--silent', 'http://localhost/up']
            interval: 5s
            timeout: 3s
            retries: 12
            start_period: 10s

    horizon:
        image: 'event-visuals-sail-8.5/app'
        init: true
        command: php artisan horizon
        environment: *app-environment
        volumes: *app-volumes
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_healthy
            redis:
                condition: service_healthy
        stop_signal: SIGTERM
        stop_grace_period: 30s

    scheduler:
        image: 'event-visuals-sail-8.5/app'
        init: true
        command: php artisan schedule:work
        environment: *app-environment
        volumes: *app-volumes
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_healthy
        stop_grace_period: 30s

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

    meilisearch:
        image: 'getmeili/meilisearch:v1.44.0'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-17730}:7700'
        environment:
            MEILI_DB_PATH: '${MEILI_DB_PATH:-/meili_data/data.ms}'
            MEILI_ENV: '${MEILI_ENV:-development}'
            MEILI_MASTER_KEY: '${MEILISEARCH_KEY:-local-event-visuals-meilisearch-master-key}'
            MEILI_NO_ANALYTICS: '${MEILI_NO_ANALYTICS:-true}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'curl', '-fsS', 'http://localhost:7700/health']
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 5s

    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-13306}:3306'
        environment:
            MYSQL_DATABASE: '${DB_DATABASE:-event_visuals}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_TEST_DATABASE: '${DB_TEST_DATABASE:-event_visuals_testing}'
            MYSQL_USER: '${DB_USERNAME:-sail}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh:ro'
        networks:
            - sail
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'MYSQL_PWD="$${MYSQL_ROOT_PASSWORD}" mysqladmin ping --host=127.0.0.1 --user=root --silent',
                ]
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 30s

    redis:
        image: 'redis:7-alpine'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 5s

networks:
    sail:
        driver: bridge

volumes:
    sail-meilisearch:
        driver: local
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
